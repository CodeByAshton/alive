# Build desktop installers for macOS (dmg/zip), Windows (nsis), and Linux
# (AppImage/deb) and attach them to a GitHub Release.
# Trigger: push a tag like v0.1.0.
name: release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  desktop:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
